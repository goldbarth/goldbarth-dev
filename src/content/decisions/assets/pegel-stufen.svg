<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 440" role="img" aria-label="Pegelstufen an echten Metern: normal ab 0, warning ab 4.50, severe ab 5.50 Meter NHN, mit steigender Pegelkurve">
<style>
.bg { fill: var(--color-surface, #141414); stroke: var(--color-border, #222222); rx: var(--radius, 2px); }
.t-title  { fill: var(--color-text, #e8e8e8); }
.t-sub    { fill: var(--color-text-2, #b8b8b8); }
.t-muted  { fill: var(--color-muted, #6a6a6a); }
.t-body   { fill: var(--color-text-2, #b8b8b8); }
.c-normal  { fill: var(--g-normal, oklch(0.70 0.08 155)); }
.c-warning { fill: var(--color-accent, oklch(0.80 0.13 75)); }
.c-severe  { fill: var(--g-severe, oklch(0.65 0.12 25)); }
.s-normal  { stroke: var(--g-normal, oklch(0.70 0.08 155)); }
.s-warning { stroke: var(--color-accent, oklch(0.80 0.13 75)); }
.s-severe  { stroke: var(--g-severe, oklch(0.65 0.12 25)); }
.c-pegel   { fill: var(--tk-keyword, oklch(0.78 0.07 245)); }
.s-pegel   { stroke: var(--tk-keyword, oklch(0.78 0.07 245)); }
.s-axis    { stroke: var(--color-border-2, #2a2a2a); }
.s-div     { stroke: var(--color-border, #222222); }
.z-normal  { fill: var(--g-normal, oklch(0.70 0.08 155)); }
.z-warning { fill: var(--color-accent, oklch(0.80 0.13 75)); }
.z-severe  { fill: var(--g-severe, oklch(0.65 0.12 25)); }
</style>

<title>Pegel rein, Stufe raus</title>
<desc>Eine Pegelachse in Metern NHN mit drei Stufen: normal ab 0, warning ab 4.50, severe ab 5.50. Eine steigende Pegelkurve ueberschreitet die warning-Schwelle.</desc>
<defs>
<marker id="arrowL" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect class="bg" x="1" y="1" width="678" height="438" stroke-width="1"/>
<text x="36" y="44" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="15" font-weight="500" class="t-title">Pegel rein, Stufe raus</text>
<text x="36" y="66" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" class="t-sub">Schwellen in Metern NHN</text>
<rect x="120" y="300" width="470" height="70" class="z-normal" opacity="0.13"/>
<rect x="120" y="180" width="470" height="120" class="c-warning" opacity="0.15"/>
<rect x="120" y="110" width="470" height="70" class="z-severe" opacity="0.15"/>
<line x1="120" y1="110" x2="120" y2="370" class="s-axis" stroke-width="1"/>
<line x1="120" y1="370" x2="590" y2="370" class="s-axis" stroke-width="1"/>
<line x1="120" y1="300" x2="590" y2="300" class="s-normal" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.7"/>
<line x1="120" y1="180" x2="590" y2="180" class="s-warning" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.7"/>
<text x="112" y="374" text-anchor="end" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" class="t-sub">0</text>
<text x="112" y="304" text-anchor="end" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" class="t-sub">4.50</text>
<text x="112" y="184" text-anchor="end" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" class="t-sub">5.50</text>
<text x="138" y="342" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="14" font-weight="500" class="c-normal">normal</text>
<text x="138" y="256" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="14" font-weight="500" class="c-warning">warning</text>
<text x="138" y="148" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="14" font-weight="500" class="c-severe">severe</text>
<path d="M120 362 C 200 358, 280 344, 360 326 C 440 308, 520 292, 580 276" fill="none" class="s-pegel" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="580" cy="276" r="4" class="c-pegel"/>
<text x="36" y="406" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" class="t-sub">Pegel steigt</text>
<line x1="118" y1="401" x2="138" y2="401" class="s-pegel" stroke-width="2" marker-end="url(#arrowL)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 440" role="img" aria-label="Hysterese mit zwei Schaltpunkten: Pegel steigt und faellt, Stufe schaltet hoch bei 4.50 und runter erst bei 4.35">
<title>Hoch sofort, runter später</title>
<desc>Ein Pegel steigt ueber 4.50 und faellt wieder. Beim Steigen schaltet die Stufe sofort bei 4.50 auf warning. Beim Fallen bleibt sie bis 4.35 auf warning und schaltet erst dann zurueck. Hoch und runter an verschiedenen Punkten.</desc>
<defs>
<marker id="arrowH" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="1" y="1" width="678" height="438" rx="10" fill="#0d0d0f" stroke="#2a2a2e" stroke-width="1"/>
<text x="36" y="44" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="15" font-weight="500" fill="#e8e6df">Hoch sofort, runter später</text>
<text x="36" y="66" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" fill="#8a8980">Dieselbe Linie, zwei Schaltpunkte</text>
<line x1="90" y1="140" x2="610" y2="140" stroke="#EF9F27" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.6"/>
<text x="82" y="144" text-anchor="end" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="11.5" fill="#8a8980">4.50</text>
<line x1="90" y1="200" x2="610" y2="200" stroke="#5DCAA5" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.5"/>
<text x="82" y="204" text-anchor="end" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="11.5" fill="#8a8980">4.35</text>
<path d="M90 250 C 170 245, 210 165, 280 120 C 320 95, 360 95, 400 120 C 470 160, 510 248, 590 256" fill="none" stroke="#85B7EB" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="252" cy="140" r="5" fill="#EF9F27"/>
<circle cx="468" cy="200" r="5" fill="#5DCAA5"/>
<text x="252" y="118" text-anchor="middle" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="11.5" fill="#EF9F27">hoch bei 4.50</text>
<text x="468" y="228" text-anchor="middle" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="11.5" fill="#5DCAA5">runter bei 4.35</text>
<text x="200" y="296" text-anchor="middle" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="11" fill="#8a8980">steigt</text>
<line x1="150" y1="292" x2="250" y2="292" stroke="#8a8980" stroke-width="1.5" marker-end="url(#arrowH)"/>
<text x="490" y="296" text-anchor="middle" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="11" fill="#8a8980">fällt</text>
<line x1="540" y1="292" x2="440" y2="292" stroke="#8a8980" stroke-width="1.5" marker-end="url(#arrowH)"/>
<line x1="36" y1="328" x2="644" y2="328" stroke="#2a2a2e" stroke-width="1"/>
<text x="36" y="360" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" fill="#a8a69d">Eine steigende Surge darf nie aufgehalten werden —</text>
<text x="36" y="382" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" fill="#a8a69d">also hoch sofort. Eine späte Deeskalation kostet nur</text>
<text x="36" y="404" font-family="'DM Mono', ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="12.5" fill="#a8a69d">eine Messung mehr — also runter mit Abstand.</text>
</svg>
